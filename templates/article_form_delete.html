{% extends 'base.html' %}

{% block title %}
    حذف مقاله
{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h3 class="card-title mb-0">حذف مقاله</h3>
                </div>
                <div class="card-body text-center">
                    <form method="post">
                        {% csrf_token %}
                        <p class="fs-5">
                            آیا از حذف مقاله
                            <strong>"{{ object.title }}"</strong>
                            مطمئن هستید؟
                        </p>
                        <p class="text-muted small">
                            ⚠️ این عمل غیرقابل بازگشت است و مقاله برای همیشه حذف خواهد شد.
                        </p>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-danger">بله، حذف شود</button>
                            <a href="{% url 'index' %}" class="btn btn-secondary">انصراف</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

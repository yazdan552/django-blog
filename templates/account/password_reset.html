{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
    فراموشی رمز عبور
{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h3 class="text-center mb-0">بازیابی رمز عبور</h3>
                </div>

                <div class="card-body">
                    <p class="text-muted mb-4">
                        ایمیل خود را وارد کنید. لینک بازیابی رمز عبور برای شما ارسال خواهد شد.
                    </p>
                    
                    <form method="POST" action="{% url 'account_reset_password' %}">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2 mt-3">
                            <button class="btn btn-info" type="submit">ارسال لینک بازیابی</button>
                        </div>
                    </form>
                </div>
                
                <div class="card-footer text-center">
                    <small>
                        <a href="{% url 'account_login' %}">بازگشت به صفحه ورود</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
